<body>

<header>
<h1>👤 Players</h1>
<p><a href="/">🏆 Back to Leaderboard</a></p>
</header>

<div class="container" id="players">
Loading players...
</div>

<script>

try {

    const response = await fetch(csvUrl);

    console.log("Response:", response);

    const text = await response.text();

    console.log(text);

    const rows = text.trim().split("\n").slice(1);

    const container =
    document.getElementById("players");

    container.innerHTML = "";

    rows.forEach(row=>{

        const cols = row.split(",");

        container.innerHTML += `
        <div class="player-card">
            <div class="player-name">${cols[0]}</div>
        </div>
        `;
    });

}
catch(error){

    console.error(error);

    document.getElementById("players").innerHTML =
    "<h2>Failed to load player data</h2>";
}

return;

    const container =
    document.getElementById("players");

    container.innerHTML = "";

    rows.forEach(row=>{

        const cols = row.split(",");

        const name = cols[0];
        const rank = cols[1];
        const points = cols[2];
        const exact = cols[3];
        const winners = cols[4];
        const winnerPick = cols[5];

        container.innerHTML += `
        <div class="player-card">
            <div class="player-name">${name}</div>

            <div class="stats">
                <div class="stat">🏆 Rank: ${rank}</div>
                <div class="stat">💯 Points: ${points}</div>
                <div class="stat">🎯 Exact Scores: ${exact}</div>
                <div class="stat">✅ Correct Winners: ${winners}</div>
                <div class="stat">🌍 Winner Pick: ${winnerPick}</div>
            </div>
        </div>
        `;
    });
}

loadPlayers();

</script>
