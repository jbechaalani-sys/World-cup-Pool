<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Players - World Cup Pool</title>

<style>

body{
    margin:0;
    background:#041E42;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#03152d;
    text-align:center;
    padding:25px;
}

h1{
    color:#FFD700;
}

.nav{
    margin-top:25px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    justify-content:center;
}

.nav a{
    background:#0A2540;
    border:2px solid #FFD700;
    color:#FFD700;
    text-decoration:none;
    padding:12px 18px;
    border-radius:12px;
    font-weight:bold;
    min-width:160px;
    text-align:center;
    transition:all .3s ease;
    box-shadow:0 4px 10px rgba(0,0,0,.3);
}

.nav a:hover{
    background:#FFD700;
    color:#041E42;
    transform:translateY(-3px);
    box-shadow:0 8px 18px rgba(255,215,0,.4);
}


.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.player-card{
    background:#0A2540;
    border:1px solid rgba(255,215,0,.25);
    border-radius:20px;
    padding:25px;
    margin-bottom:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.25);
    transition:all .3s ease;
}

.player-card:hover{
    transform:translateY(-3px);
    border-color:#FFD700;
}

.player-name{
color:#FFD700;
font-size:30px;
font-weight:bold;
margin-bottom:10px;
}

.stats{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-top:15px;
}

.stat{
background:#03152d;
border:1px solid rgba(255,215,0,.4);
padding:10px 15px;
border-radius:10px;
}


}
.prediction-btn{
    display:block;
    width:100%;
    text-align:center;
    margin-top:20px;
    background:linear-gradient(135deg,#FFD700,#F4C430);
    color:#041E42;
    text-decoration:none;
    padding:20px;
    border-radius:15px;
    font-size:20px;
    font-weight:800;
    border:3px solid #FFD700;
    transition:all .3s ease;
    box-shadow:0 0 20px rgba(255,215,0,.4);
}

.prediction-btn:hover{
    transform:translateY(-4px);
    background:#FFF4B0;
    color:#041E42;
    box-shadow:0 0 30px rgba(255,215,0,.7);
}

.prediction-btn:hover{
    opacity:.85;
}

</style>
</head>

<body>

<header>

<h1>👤 Players</h1>

<div class="nav">
    <a href="/">🏆 Leaderboard</a>
    <a href="/players.html" style="background:#FFD700;color:#041E42;">👤 Players</a>
    <a href="/fixtures.html">⚽ Fixtures</a>
    <a href="/stats.html">📊 Stats</a>
    <a href="/rules.html">🎁 Rules & Prizes</a>
</div>

</header>

<div class="container" id="players">
Loading players...
</div>

<script>

const playersUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTGUvaOJD7YamWr78XRNEv47WxBqnOWWM3SoJxZ11iqqY-0tXseAzlsgtheed1OaVQYr-YOxjm3cI74/pub?gid=816094404&single=true&output=csv";

const linksUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTGUvaOJD7YamWr78XRNEv47WxBqnOWWM3SoJxZ11iqqY-0tXseAzlsgtheed1OaVQYr-YOxjm3cI74/pub?gid=1313899245&single=true&output=csv";

async function loadPlayers(){

try{

const playersResponse = await fetch(playersUrl);
const playersText = await playersResponse.text();

const linksResponse = await fetch(linksUrl);
const linksText = await linksResponse.text();

const playerRows =
playersText.trim().split("\n").slice(1);

const linkRows =
linksText.trim().split("\n").slice(1);

const links = {};

linkRows.forEach(row=>{

const cols = row.split(",");

links[cols[0]?.trim()] =
cols[1]?.trim();

});

const container =
document.getElementById("players");

container.innerHTML = "";

playerRows.forEach(row=>{

const cols = row.split(",");

const name = cols[0] || "";
const rank = cols[1] || "0";
const points = cols[2] || "0";
const exact = cols[3] || "0";
const winners = cols[4] || "0";
const winnerPick = cols[5] || "";

const predictionLink =
links[name] || "#";

container.innerHTML += `

<div class="player-card">

<div class="player-name">
👤 ${name}
</div>

<div class="stats">

<div class="stat">
🏆 Rank: ${rank}
</div>

<div class="stat">
💯 Points: ${points}
</div>

<div class="stat">
🎯 Exact Scores: ${exact}
</div>

<div class="stat">
✅ Correct Winners: ${winners}
</div>

<div class="stat">
🏆 Winner Pick: ${winnerPick}
</div>

</div>

<div style="
margin-top:15px;
color:#FFD700;
font-size:14px;
font-weight:bold;
text-align:center;">
🏆 Click to view The complete World Cup prediction 🏆
</div>

<a
class="prediction-btn"
href="${predictionLink}"
target="_blank">
⚽ VIEW FULL PREDICTIONS ⚽
</a>

</div>

`;

});

}
catch(error){

console.error(error);

document.getElementById("players").innerHTML =
"<h2>Failed to load players</h2>";

}

}

loadPlayers();

</script>

</body>
</html>
