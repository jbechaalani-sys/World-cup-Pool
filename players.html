```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Players - World Cup Pool</title>

<style>
body{
    margin:0;
    background:#041E42;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#03152d;
    text-align:center;
    padding:25px;
}

h1{
    color:#FFD700;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.player-card{
    background:#0A2540;
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
}

.player-name{
    color:#FFD700;
    font-size:24px;
    font-weight:bold;
}

.stats{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-top:10px;
}

.stat{
    background:#03152d;
    padding:10px 15px;
    border-radius:10px;
}

a{
    color:#FFD700;
    text-decoration:none;
}
</style>
</head>

<body>

<header>
<h1>👤 Players</h1>
<p><a href="/">🏆 Back to Leaderboard</a></p>
</header>

<div class="container" id="players">
Loading players...
</div>

<script>

const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTGUvaOJD7YamWr78XRNEv47WxBqnOWWM3SoJxZ11iqqY-0tXseAzlsgtheed1OaVQYr-YOxjm3cI74/pub?gid=816094404&single=true&output=csv";

async function loadPlayers() {

    try {

        const response = await fetch(csvUrl);

        if(!response.ok){
            throw new Error("Failed to fetch CSV");
        }

        const text = await response.text();

        const rows = text.trim().split("\n").slice(1);

        const container =
        document.getElementById("players");

        container.innerHTML = "";

        rows.forEach(row => {

            const cols = row.split(",");

            const name = cols[0] || "";
            const rank = cols[1] || "";
            const points = cols[2] || "";
            const exact = cols[3] || "";
            const winners = cols[4] || "";
            const winnerPick = cols[5] || "";

            container.innerHTML += `
            <div class="player-card">

                <div class="player-name">
                    ${name}
                </div>

                <div class="stats">
                    <div class="stat">🏆 Rank: ${rank}</div>
                    <div class="stat">💯 Points: ${points}</div>
                    <div class="stat">🎯 Exact Scores: ${exact}</div>
                    <div class="stat">✅ Correct Winners: ${winners}</div>
                    <div class="stat">🌍 Winner Pick: ${winnerPick}</div>
                </div>

            </div>
            `;
        });

    } catch(error) {

        console.error(error);

        document.getElementById("players").innerHTML =
        "<h2>❌ Failed to load player data.</h2><p>Check the browser console (F12).</p>";
    }
}

loadPlayers();

</script>

</body>
</html>
```
