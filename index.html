```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FIFA World Cup 2026 Pool</title>

<style>
body{
    margin:0;
    background:#041E42;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    text-align:center;
    padding:30px;
    background:#03152d;
}

h1{
    color:#FFD700;
    margin:0;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:#0A2540;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    color:#FFD700;
    text-align:left;
    padding:12px;
}

td{
    padding:12px;
    border-top:1px solid rgba(255,255,255,.1);
}

.podium{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:30px;
    flex-wrap:wrap;
}

.podium-card{
    background:#0A2540;
    border-radius:15px;
    padding:20px;
    min-width:180px;
    text-align:center;
}

.gold{
    border:2px solid gold;
}

.silver{
    border:2px solid silver;
}

.bronze{
    border:2px solid #cd7f32;
}

.nav{
    text-align:center;
    margin-top:15px;
}

.nav a{
    color:#FFD700;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
    <h1>🏆 FIFA WORLD CUP 2026 POOL</h1>
    <p>Live Leaderboard</p>

    <div class="nav">
        <a href="/">Leaderboard</a>
        <a href="/players.html">Players</a>
    </div>
</header>

<div class="container">

    <div id="podium" class="podium"></div>

    <div class="card">

        <h2>Leaderboard</h2>

        <table>

            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Points</th>
                </tr>
            </thead>

            <tbody id="leaderboard">
                <tr>
                    <td colspan="3">Loading...</td>
                </tr>
            </tbody>

        </table>

    </div>

</div>

<script>

const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTGUvaOJD7YamWr78XRNEv47WxBqnOWWM3SoJxZ11iqqY-0tXseAzlsgtheed1OaVQYr-YOxjm3cI74/pub?gid=457437421&single=true&output=csv";

async function loadLeaderboard(){

    try {

        const response = await fetch(csvUrl);

        if(!response.ok){
            throw new Error("Failed to fetch leaderboard");
        }

        const text = await response.text();

        const rows = text.trim().split("\n").slice(1);

        let players = rows.map(row => {

            const cols = row.split(",");

            return {
                name: cols[0] || "",
                rank: Number(cols[1]) || 0,
                points: Number(cols[2]) || 0
            };

        });

        players.sort((a,b) => b.points - a.points);

        const tbody =
        document.getElementById("leaderboard");

        tbody.innerHTML = "";

        players.forEach((player,index)=>{

            tbody.innerHTML += `
            <tr>
                <td>${index + 1}</td>
                <td>${player.name}</td>
                <td>${player.points}</td>
            </tr>
            `;

        });

        const podium =
        document.getElementById("podium");

        podium.innerHTML = "";

        const medals = [
            {emoji:"🥇", className:"gold"},
            {emoji:"🥈", className:"silver"},
            {emoji:"🥉", className:"bronze"}
        ];

        players.slice(0,3).forEach((player,index)=>{

            podium.innerHTML += `
            <div class="podium-card ${medals[index].className}">
                <h2>${medals[index].emoji}</h2>
                <h3>${player.name}</h3>
                <p>${player.points} pts</p>
            </div>
            `;

        });

    }
    catch(error){

        console.error(error);

        document.getElementById("leaderboard").innerHTML =
        "<tr><td colspan='3'>❌ Failed to load leaderboard</td></tr>";

    }

}

loadLeaderboard();

</script>

</body>
</html>
