<html>
<head>
<meta charset="UTF-8">
<title>World Cup Pool 2026</title>

<style>
body{
  margin:0;
  background:#041E42;
  color:white;

}

header{
  background:#03152d;

.container{

  background:#0A2540;

<body>

<header>
<h1>🏆 FIFA WORLD CUP 2026 POOL</h1>
</header>

<div class="container">

<div class="card">
<h2>Live Leaderboard</h2>

<table id="leaderboard">
<thead>
<tr>
<th>Rank</th>
<th>Player</th>
<th>Points</th>
</tr>
</thead>
<tbody>
<tr>
<td colspan="3">Loading...</td>
</tr>
</tbody>
</table>

</div>

</div>

<script>
const players = [
  {name:"Bouz", rank:12, points:0},
  {name:"Jad", rank:12, points:0},
  {name:"Azmi", rank:12, points:0},
  {name:"George", rank:1, points:100},
  {name:"Oubai", rank:12, points:0},
  {name:"Aram", rank:1, points:100},
  {name:"Jacques", rank:1, points:100},
  {name:"Karl", rank:1, points:100},
  {name:"Nehad", rank:1, points:100},
  {name:"Nadim", rank:1, points:100},
  {name:"Mouz", rank:1, points:100},
  {name:"Ziad", rank:1, points:100},
  {name:"Antoine", rank:1, points:100}
];

players.sort((a,b)=>b.points-a.points);

const tbody=document.querySelector("#leaderboard tbody");

tbody.innerHTML="";

players.forEach((p,index)=>{
tbody.innerHTML += `
<tr>
<td class="rank">${index+1}</td>
<td>${p.name}</td>
<td>${p.points}</td>
</tr>`;
});
</script>

</body>
</html>
