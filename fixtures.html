<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fixtures - FIFA World Cup Pool</title>

<style>
body{
    margin:0;
    background:#041E42;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#03152d;
    text-align:center;

}

    color:#FFD700;
}

.nav{
    margin-top:25px;
    display:flex;

    flex-wrap:wrap;
    justify-content:center;
}

.nav a{
    background:#0A2540;
    border:2px solid #FFD700;
    color:#FFD700;
    text-decoration:none;
    padding:12px 18px;
    border-radius:12px;
    font-weight:bold;
    min-width:160px;
    text-align:center;
    transition:all .3s ease;
    box-shadow:0 4px 10px rgba(0,0,0,.3);
}

.nav a:hover{
    background:#FFD700;
    color:#041E42;
    transform:translateY(-3px);
    box-shadow:0 8px 18px rgba(255,215,0,.4);
}
}

.container{
    max-width:1200px;

    background:#0A2540;

    font-size:22px;
    font-weight:bold;
}

    margin-top:10px;
    opacity:.8;
}

.status{
    display:inline-block;
    margin-top:10px;
    background:#FFD700;
    color:#041E42;
    padding:5px 10px;
    border-radius:8px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
    <h1>⚽ FIFA World Cup 2026 Fixtures</h1>

    <div class="nav">
    <a href="/">🏆 Leaderboard</a>
    <a href="/players.html">👤 Players</a>
    <a href="/fixtures.html">⚽ Fixtures</a>
    <a href="/stats.html">📊 Stats</a>
    <a href="/rules.html">🎁 Rules & Prizes</a>
</div>
    
</header>

<div class="container" id="fixtures">
Loading fixtures...
</div>

<script>

const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTGUvaOJD7YamWr78XRNEv47WxBqnOWWM3SoJxZ11iqqY-0tXseAzlsgtheed1OaVQYr-YOxjm3cI74/pub?gid=186871962&single=true&output=csv";

async function loadFixtures(){

    try{

        const response = await fetch(csvUrl);
        const text = await response.text();

        const rows = text.trim().split("\n").slice(1);

        const container =
        document.getElementById("fixtures");

        container.innerHTML = "";

        rows.forEach(row=>{

            const cols = row.split(",");

            const matchNo = cols[0] || "";
            const date = cols[1] || "";
            const time = cols[2] || "";
            const group = cols[3] || "";
            const home = cols[4] || "";
            const away = cols[5] || "";
            const homeScore = cols[6] || "";
            const awayScore = cols[7] || "";
            const status = cols[8] || "Upcoming";

            let scoreDisplay =
                homeScore && awayScore
                ? `${homeScore} - ${awayScore}`
                : "vs";

            container.innerHTML += `
            <div class="match-card">

                <div class="group">
                    Match ${matchNo} • ${group}
                </div>

                <div class="teams">
                    ${home} ${scoreDisplay} ${away}
                </div>

                <div class="details">
                    ${date} • ${time}
                </div>

                <div class="status">
                    ${status}
                </div>

            </div>
            `;
        });

    }
    catch(error){

        console.error(error);

        document.getElementById("fixtures").innerHTML =
        "<h2>❌ Failed to load fixtures.</h2>";
    }
}

loadFixtures();

</script>

</body>
</html>
